name: PHP Unit Tests

on:
  workflow_dispatch:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:  
      - name: Checkout Repository
        uses: actions/checkout@v4

      - uses: php-actions/composer@v6
        with:
          php_version: "8.2"
          dev: "yes"

      - name: Run tests
        run: |
          composer test
