name: PHP Unit Tests

on:
  workflow_dispatch:
  pull_request:

jobs:
  test:
    name: "WP ${{ matrix.config.wp }}, multisite: ${{ matrix.config.ms }}, PHP: ${{ matrix.config.php }}"
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        config:
          # PHP 8.2
          - { wp: 6.6, ms: "0", php: "8.2" }
          - { wp: 6.6, ms: "1", php: "8.2" }
          - { wp: 6.7, ms: "0", php: "8.2" }
          - { wp: 6.7, ms: "1", php: "8.2" }
          - { wp: 6.8, ms: "0", php: "8.2" }
          - { wp: 6.8, ms: "1", php: "8.2" }
          - { wp: latest, ms: "0", php: "8.2" }
          - { wp: latest, ms: "1", php: "8.2" }
          - { wp: nightly, ms: "0", php: "8.2" }
          - { wp: nightly, ms: "1", php: "8.2" }
          # PHP 8.3
          - { wp: latest, ms: "0", php: "8.3" }
          - { wp: latest, ms: "1", php: "8.3" }
          # PHP 8.4
          - { wp: latest, ms: "0", php: "8.4" }
          - { wp: latest, ms: "1", php: "8.4" }
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - uses: php-actions/composer@v6
        with:
          php_version: "${{ matrix.config.php }}"
          dev: "yes"

      - name: Run tests
        run: |
          composer test-ci -- --php ${matrix.config.php} --wp ${matrix.config.wp} --multisite ${matrix.config.ms}
